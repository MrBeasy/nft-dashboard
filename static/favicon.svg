<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0A0F1E"/>
  <!-- grid lines -->
  <line x1="3" y1="26" x2="29" y2="26" stroke="#1E293B" stroke-width="0.75"/>
  <line x1="3" y1="19" x2="29" y2="19" stroke="#1E293B" stroke-width="0.75"/>
  <line x1="3" y1="12" x2="29" y2="12" stroke="#1E293B" stroke-width="0.75"/>
  <!-- price line (orange dashed) -->
  <polyline points="3,22 8,20 13,23 18,17 23,19 29,15"
            fill="none" stroke="#FB923C" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="2.5,2"/>
  <!-- ratio line (blue solid) -->
  <polyline points="3,24 8,18 13,20 18,9 23,13 29,10"
            fill="none" stroke="#60A5FA" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
