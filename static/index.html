<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Bid/Listing Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0A0F1E;
      color: #E2E8F0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1E293B;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #F8FAFC; }
    header .subtitle { font-size: 12px; color: #475569; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #1E293B;
      padding: 16px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #334155;
      margin-bottom: 8px;
    }

    .coll-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .coll-item:hover { background: #1E293B; }

    .coll-check {
      width: 15px; height: 15px;
      border-radius: 3px;
      border: 1.5px solid #334155;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .coll-check.checked { border-color: var(--c); background: var(--c); }
    .coll-check.checked::after {
      content: '';
      display: block;
      width: 8px; height: 5px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }

    .coll-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--c);
      flex-shrink: 0;
    }

    .coll-meta { flex: 1; min-width: 0; }
    .coll-name { font-size: 12px; color: #CBD5E1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .coll-floor { font-size: 10px; color: #475569; margin-top: 1px; }

    /* ── Controls ────────────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .pill {
      padding: 4px 9px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid #1E293B;
      background: transparent;
      color: #64748B;
      cursor: pointer;
      transition: all 0.12s;
      line-height: 1.4;
    }
    .pill:hover { border-color: #334155; color: #94A3B8; }
    .pill.on { background: #172554; border-color: #1D4ED8; color: #93C5FD; }

    /* ── Chart area ──────────────────────────────────────────────────── */
    .chart-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 12px;
      min-width: 0;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-label { font-size: 11px; color: #475569; }

    .canvas-box {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #chart { display: block; width: 100% !important; height: 100% !important; }

    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: 14px;
      pointer-events: none;
    }

    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,15,30,0.6);
    }
    .spinner.show { display: flex; }
    .spinner::after {
      content: '';
      width: 28px; height: 28px;
      border: 2px solid #1E293B;
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tab nav ─────────────────────────────────────────────────────────── */
    .tab-group { display: flex; gap: 3px; margin-left: auto; }
    .tab-btn {
      padding: 5px 14px; font-size: 12px; border-radius: 5px;
      border: 1px solid #1E293B; background: transparent;
      color: #475569; cursor: pointer; transition: all 0.12s;
      font-family: inherit;
    }
    .tab-btn:hover { color: #94A3B8; border-color: #334155; }
    .tab-btn.on { background: #172554; border-color: #1D4ED8; color: #93C5FD; }

    /* ── Spread view ─────────────────────────────────────────────────────── */
    .spread-view {
      display: none; flex: 1; overflow: auto;
      padding: 28px 36px; min-height: 0;
    }

    .spread-table {
      border-collapse: collapse; font-size: 13px; white-space: nowrap;
    }

    .spread-table th {
      text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: #64748B;
      padding: 0 18px 12px 0; border-bottom: 1px solid #1E293B;
      user-select: none;
    }
    .spread-table th + th { padding-left: 4px; }
    .spread-table th[data-col] { cursor: pointer; }
    .spread-table th[data-col]:hover { color: #94A3B8; }
    .spread-table th.sort-active { color: #94A3B8; }
    .spread-table th.sort-active::after { content: attr(data-arrow); margin-left: 4px; }

    .spread-table td {
      padding: 10px 18px 10px 0; border-bottom: 1px solid #0D1424;
      vertical-align: middle; color: #94A3B8;
    }
    .spread-table td + td { padding-left: 4px; }
    .spread-table tbody tr { transition: background 0.1s; }
    .spread-table tbody tr:hover td { background: #0D1424; }
    .spread-table tbody tr.no-data td { opacity: 0.5; }

    /* Rank */
    .rank-num { font-size: 11px; font-weight: 600; color: #475569; }
    .rank-num.r1 { color: #FBBF24; }
    .rank-num.r2 { color: #94A3B8; }
    .rank-num.r3 { color: #C2773A; }

    /* Collection cell */
    .coll-cell { display: flex; align-items: center; gap: 9px; }
    .coll-cell .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .coll-cell .name { color: #CBD5E1; min-width: 120px; max-width: 220px;
      overflow: hidden; text-overflow: ellipsis; }

    /* Bar cell (Net Spread %) */
    .bar-td { position: relative; min-width: 160px; }
    .bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(59,130,246,0.09);
      border-right: 2px solid rgba(59,130,246,0.30);
      pointer-events: none; transition: width 0.35s ease;
    }
    .bar-fill.neg { background: rgba(239,68,68,0.09); border-right-color: rgba(239,68,68,0.30); }
    .bar-num {
      position: relative; z-index: 1;
      font-size: 13px; font-weight: 600; color: #60A5FA;
    }
    .bar-num.neg { color: #F87171; }

    /* Value coloring */
    .v-pos { color: #34D399; }
    .v-neg { color: #F87171; }
    .v-nil { color: #334155; }
  </style>
</head>
<body>

<header>
  <h1>NFT Bid/Listing Dashboard</h1>
  <span class="subtitle">% sold via listing or bid dump vs avg sale price — rolling window</span>
  <div class="tab-group">
    <button class="tab-btn on" id="tab-chart">Chart</button>
    <button class="tab-btn" id="tab-spread">Spread Ranking</button>
  </div>
</header>

<div class="layout" id="view-chart">

  <div class="sidebar">
    <div>
      <div class="section-label">Collections</div>
      <div id="coll-list"><span style="font-size:12px;color:#334155">Loading…</span></div>
    </div>

    <div>
      <div class="section-label">Rolling window</div>
      <div class="btn-row" id="win-btns">
        <button class="pill" data-v="7">7d</button>
        <button class="pill" data-v="14">14d</button>
        <button class="pill on" data-v="30">30d</button>
        <button class="pill" data-v="60">60d</button>
        <button class="pill" data-v="90">90d</button>
      </div>
    </div>

    <div>
      <div class="section-label">Sale type view</div>
      <div class="btn-row" id="metric-btns">
        <button class="pill on" data-v="listing">Listing %</button>
        <button class="pill" data-v="dump">Bid Dump %</button>
      </div>
    </div>

    <div>
      <div class="section-label">Price scale</div>
      <div class="btn-row" id="scale-btns">
        <button class="pill on" data-v="linear">Linear</button>
        <button class="pill" data-v="log">Log</button>
      </div>
    </div>

    <div>
      <div class="section-label">Date range</div>
      <div class="btn-row" id="range-btns">
        <button class="pill on" data-v="all">All</button>
        <button class="pill" data-v="1y">1Y</button>
        <button class="pill" data-v="6m">6M</button>
        <button class="pill" data-v="3m">3M</button>
        <button class="pill" data-v="1m">1M</button>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="canvas-box">
      <canvas id="chart"></canvas>
      <div class="empty" id="empty">Select a collection to begin</div>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>

</div>

<div class="spread-view" id="view-spread">
  <table class="spread-table" id="spread-table">
    <thead>
      <tr>
        <th style="padding-right:24px">#</th>
        <th>Collection</th>
        <th class="sort-active" data-col="net_pct" data-arrow="↓">Net Spread %</th>
        <th data-col="gross_pct">Gross %</th>
        <th data-col="net_eth">Net Ξ</th>
        <th data-col="vol_all">Sales/Day (All)</th>
        <th data-col="vol_30d">Sales/Day (30d)</th>
        <th data-col="ev">EV in ETH</th>
        <th data-col="floor">Floor Ξ</th>
        <th data-col="offer">Offer Ξ</th>
        <th data-col="days">Days</th>
      </tr>
    </thead>
    <tbody id="spread-tbody"></tbody>
  </table>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const PALETTE = ['#60A5FA','#FB923C','#34D399','#C084FC','#F87171','#FBBF24'];

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  collections: [],
  colors: new Map(),       // slug → hex color
  selected: new Set(),
  cache: {},               // slug → raw daily API data
  window: 30,
  metric: 'listing',
  scale: 'linear',
  range: 'all',
  showAggregate: true,
};

let chart = null;

// ── Rolling-window helpers (O(n) sliding window) ─────────────────────────────

function rollingRatio(data, win, metric) {
  const n = data.days.length;
  const out = new Array(n);
  let bs = 0, ls = 0, left = 0;
  for (let i = 0; i < n; i++) {
    bs += data.bids[i]; ls += data.listings[i];
    while (i - left + 1 > win) { bs -= data.bids[left]; ls -= data.listings[left]; left++; }
    const total = bs + ls;
    out[i] = { x: data.days[i], y: total > 0 ? (metric === 'dump' ? bs : ls) / total * 100 : null };
  }
  return out;
}

function dailyPrice(data) {
  return data.days.map((day, i) => ({
    x: day,
    y: data.sale_count[i] > 0 ? data.total_price[i] / data.sale_count[i] : null,
  }));
}

function filterRange(pts, range) {
  if (range === 'all') return pts;
  const ms = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 }[range] * 86400000;
  const cutoff = new Date(Date.now() - ms).toISOString().slice(0, 10);
  return pts.filter(p => p.x >= cutoff);
}

function buildAggregate(win, metric, range) {
  const ratioByDay = new Map();
  const priceByDay = new Map();

  for (const { slug } of S.collections) {
    const d = S.cache[slug];
    if (!d) continue;

    for (const pt of rollingRatio(d, win, metric)) {
      if (pt.y != null) {
        if (!ratioByDay.has(pt.x)) ratioByDay.set(pt.x, []);
        ratioByDay.get(pt.x).push(pt.y);
      }
    }
    for (const pt of dailyPrice(d)) {
      if (pt.y != null) {
        if (!priceByDay.has(pt.x)) priceByDay.set(pt.x, []);
        priceByDay.get(pt.x).push(pt.y);
      }
    }
  }

  const avg = arr => arr.reduce((s, v) => s + v, 0) / arr.length;
  const sort = map =>
    Array.from(map.entries())
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([x, ys]) => ({ x, y: avg(ys) }));

  return {
    ratioData: filterRange(sort(ratioByDay), range),
    priceData: filterRange(sort(priceByDay), range),
  };
}

// ── Chart ─────────────────────────────────────────────────────────────────────

function buildDatasets() {
  const ds = [];
  for (const slug of S.selected) {
    const d = S.cache[slug];
    if (!d) continue;
    const name  = S.collections.find(c => c.slug === slug)?.name ?? slug;
    const color = S.colors.get(slug);

    const ratioData = filterRange(rollingRatio(d, S.window, S.metric), S.range);
    const priceData = filterRange(dailyPrice(d), S.range);

    ds.push({
      label: `${name} — ${S.metric === 'dump' ? 'Bid Dump %' : 'Listing %'}`,
      data: ratioData,
      borderColor: color,
      backgroundColor: color + '18',
      yAxisID: 'yR',
      borderWidth: 2,
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.25, spanGaps: true,
      fill: false,
    });
    ds.push({
      label: `${name} — Daily Avg Price (Ξ)`,
      data: priceData,
      borderColor: color,
      backgroundColor: 'transparent',
      yAxisID: 'yP',
      borderWidth: 1.5,
      borderDash: [6, 3],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.25, spanGaps: true,
      fill: false,
    });
  }
  if (S.showAggregate) {
    const { ratioData, priceData } = buildAggregate(S.window, S.metric, S.range);
    const AGG_COLOR = '#F8FAFC';
    ds.push({
      label: `All Collections — ${S.metric === 'dump' ? 'Bid Dump %' : 'Listing %'} (avg)`,
      data: ratioData,
      borderColor: AGG_COLOR,
      backgroundColor: AGG_COLOR + '18',
      yAxisID: 'yR',
      borderWidth: 2.5,
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.25, spanGaps: true,
      fill: false,
    });
    ds.push({
      label: 'All Collections — Avg Price (Ξ)',
      data: priceData,
      borderColor: AGG_COLOR,
      backgroundColor: 'transparent',
      yAxisID: 'yP',
      borderWidth: 2,
      borderDash: [6, 3],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.25, spanGaps: true,
      fill: false,
    });
  }

  return ds;
}

function redraw() {
  const datasets = buildDatasets();
  const hasData = datasets.length > 0;

  document.getElementById('empty').style.display = hasData ? 'none' : 'flex';

  const canvas = document.getElementById('chart');
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  chart = null;
  if (!hasData) return;

  const ctx = canvas.getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'x', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: '#CBD5E1', font: { size: 11 },
            boxWidth: 18, padding: 12,
            usePointStyle: false,
          },
        },
        tooltip: {
          backgroundColor: '#0F172A',
          titleColor: '#F1F5F9',
          bodyColor: '#CBD5E1',
          borderColor: '#334155',
          borderWidth: 1,
          padding: 10,
          filter: (item, index, array) =>
            array.findIndex(i => i.datasetIndex === item.datasetIndex) === index,
          callbacks: {
            label(ctx) {
              const v = ctx.parsed.y;
              if (v == null) return null;
              if (ctx.dataset.yAxisID === 'yR') return `  ${ctx.dataset.label}: ${v.toFixed(1)}%`;
              return `  ${ctx.dataset.label}: ${v.toFixed(4)} ETH`;
            },
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'MMM d, yyyy' },
          grid: { color: '#0F1929' },
          ticks: { color: '#94A3B8', maxTicksLimit: 10 },
        },
        yR: {
          type: 'linear',
          position: 'left',
          min: 0,
          max: 100,
          grid: { color: '#0F1929' },
          ticks: {
            color: '#94A3B8',
            callback: v => v + '%',
          },
          title: {
            display: true,
            text: S.metric === 'dump' ? 'Bid Dump % of Sales' : 'Listing % of Sales',
            color: '#94A3B8', font: { size: 10 },
          },
        },
        yP: {
          type: S.scale === 'log' ? 'logarithmic' : 'linear',
          position: 'right',
          min: S.scale === 'log' ? undefined : 0,
          grid: { display: false },
          ticks: {
            color: '#94A3B8',
            callback(v) {
              return v >= 0.01 ? v.toFixed(3) + 'Ξ' : v.toExponential(1) + 'Ξ';
            },
          },
          title: {
            display: true,
            text: 'Daily Avg Sale Price (ETH)',
            color: '#94A3B8', font: { size: 10 },
          },
        },
      },
    },
  });
}

// ── Data fetching ─────────────────────────────────────────────────────────────

async function loadCollection(slug) {
  if (S.cache[slug]) return;
  const spinner = document.getElementById('spinner');
  spinner.classList.add('show');
  try {
    const r = await fetch(`/api/chart-data?collections=${encodeURIComponent(slug)}`);
    const json = await r.json();
    if (json[slug]) S.cache[slug] = json[slug];
  } finally {
    spinner.classList.remove('show');
  }
}

async function loadAllCollections() {
  const uncached = S.collections.filter(c => !S.cache[c.slug]);
  if (!uncached.length) return;
  const spinner = document.getElementById('spinner');
  spinner.classList.add('show');
  try {
    const slugs = uncached.map(c => c.slug).join(',');
    const r = await fetch(`/api/chart-data?collections=${encodeURIComponent(slugs)}`);
    const json = await r.json();
    for (const [slug, data] of Object.entries(json)) S.cache[slug] = data;
  } finally {
    spinner.classList.remove('show');
  }
}

async function toggle(slug, on) {
  if (on) {
    S.selected.add(slug);
    await loadCollection(slug);
  } else {
    S.selected.delete(slug);
  }
  redraw();
}

// ── Sidebar rendering ─────────────────────────────────────────────────────────

function renderCollections() {
  const el = document.getElementById('coll-list');
  el.innerHTML = '';

  const aggItem = document.createElement('div');
  aggItem.className = 'coll-item';
  aggItem.style.setProperty('--c', '#F8FAFC');
  aggItem.innerHTML = `
    <div class="coll-check ${S.showAggregate ? 'checked' : ''}"></div>
    <div class="coll-dot"></div>
    <div class="coll-meta">
      <div class="coll-name">All Collections</div>
      <div class="coll-floor">equal-weighted avg</div>
    </div>`;
  aggItem.addEventListener('click', async () => {
    S.showAggregate = !S.showAggregate;
    aggItem.querySelector('.coll-check').classList.toggle('checked', S.showAggregate);
    if (S.showAggregate) await loadAllCollections();
    redraw();
  });
  el.appendChild(aggItem);

  const sep = document.createElement('div');
  sep.style.cssText = 'height:1px;background:#1E293B;margin:8px 0';
  el.appendChild(sep);

  S.collections.forEach(coll => {
    const color = S.colors.get(coll.slug);
    const checked = S.selected.has(coll.slug);
    const item = document.createElement('div');
    item.className = 'coll-item';
    item.style.setProperty('--c', color);
    item.innerHTML = `
      <div class="coll-check ${checked ? 'checked' : ''}" data-slug="${coll.slug}"></div>
      <div class="coll-dot"></div>
      <div class="coll-meta">
        <div class="coll-name" title="${coll.name}">${coll.name}</div>
        <div class="coll-floor">${coll.floor_price_eth != null ? coll.floor_price_eth.toFixed(4) + ' Ξ floor' : ''}</div>
      </div>`;
    item.addEventListener('click', () => {
      const now = S.selected.has(coll.slug);
      item.querySelector('.coll-check').classList.toggle('checked', !now);
      toggle(coll.slug, !now);
    });
    el.appendChild(item);
  });
}

// ── Button groups ─────────────────────────────────────────────────────────────

function setupGroup(id, stateKey, onchange) {
  document.getElementById(id).addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    document.querySelectorAll(`#${id} .pill`).forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const v = btn.dataset.v;
    S[stateKey] = stateKey === 'window' ? parseInt(v) : v;
    onchange();
  });
}

// ── Spread tab ────────────────────────────────────────────────────────────────

const spreadSort = { col: 'net_pct', dir: 'desc' };

function switchTab(tab) {
  const isChart = tab === 'chart';
  document.getElementById('tab-chart').classList.toggle('on', isChart);
  document.getElementById('tab-spread').classList.toggle('on', !isChart);
  document.getElementById('view-chart').style.display = isChart ? 'flex' : 'none';
  document.getElementById('view-spread').style.display = isChart ? 'none' : 'block';
  if (!isChart) renderSpreadTable();
}

function collEV(c) {
  const f = c.floor_price_eth, p = c.avg_net_spread_pct, v = c.avg_daily_sales_30d;
  return (f != null && p != null && v != null) ? f * (p / 100) * (v / 2) : null;
}

function spreadVal(c, col) {
  return { net_pct: c.avg_net_spread_pct, gross_pct: c.avg_gross_spread_pct,
           net_eth: c.avg_net_spread_eth, floor: c.floor_price_eth,
           offer: c.best_offer_eth, days: c.spread_pair_count,
           vol_all: c.avg_daily_sales_alltime, vol_30d: c.avg_daily_sales_30d,
           ev: collEV(c) }[col] ?? null;
}

function fmtPct(v, cls) {
  if (v == null) return `<span class="v-nil">—</span>`;
  return `<span class="${cls ?? (v >= 0 ? 'v-pos' : 'v-neg')}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}
function fmtEth(v) {
  if (v == null) return `<span class="v-nil">—</span>`;
  return `<span class="${v >= 0 ? 'v-pos' : 'v-neg'}">${v >= 0 ? '+' : ''}${v.toFixed(4)}</span>`;
}
function fmtNum(v, decimals = 4) {
  return v != null ? v.toFixed(decimals) : `<span class="v-nil">—</span>`;
}

function renderSpreadTable() {
  const colls = [...S.collections].sort((a, b) => {
    const av = spreadVal(a, spreadSort.col), bv = spreadVal(b, spreadSort.col);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    return spreadSort.dir === 'desc' ? bv - av : av - bv;
  });

  const pcts = colls.map(c => c.avg_net_spread_pct).filter(v => v != null);
  const maxAbs = pcts.length ? Math.max(...pcts.map(Math.abs), 0.0001) : 1;

  document.querySelectorAll('#spread-table th[data-col]').forEach(th => {
    th.classList.toggle('sort-active', th.dataset.col === spreadSort.col);
    if (th.dataset.col === spreadSort.col)
      th.dataset.arrow = spreadSort.dir === 'desc' ? '↓' : '↑';
  });

  const tbody = document.getElementById('spread-tbody');
  tbody.innerHTML = '';
  let rank = 1;

  for (const c of colls) {
    const has = c.avg_net_spread_pct != null;
    const n = c.avg_net_spread_pct;
    const barW = has ? Math.min(100, Math.abs(n) / maxAbs * 100).toFixed(1) : 0;
    const rankCls = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const color = S.colors.get(c.slug) ?? '#475569';

    const tr = document.createElement('tr');
    if (!has) tr.classList.add('no-data');
    tr.innerHTML = `
      <td><span class="rank-num ${has ? rankCls : ''}">${has ? rank : '—'}</span></td>
      <td><div class="coll-cell">
        <div class="dot" style="background:${color}"></div>
        <span class="name" title="${c.name}">${c.name}</span>
      </div></td>
      <td class="bar-td">
        ${has ? `<div class="bar-fill${n < 0 ? ' neg' : ''}" style="width:${barW}%"></div>
        <span class="bar-num${n < 0 ? ' neg' : ''}">${n >= 0 ? '+' : ''}${n.toFixed(2)}%</span>`
        : `<span class="v-nil">—</span>`}
      </td>
      <td>${fmtPct(c.avg_gross_spread_pct)}</td>
      <td>${fmtEth(c.avg_net_spread_eth)}</td>
      <td>${c.avg_daily_sales_alltime != null ? c.avg_daily_sales_alltime.toFixed(1) : '<span class="v-nil">—</span>'}</td>
      <td>${c.avg_daily_sales_30d != null ? c.avg_daily_sales_30d.toFixed(1) : '<span class="v-nil">—</span>'}</td>
      <td>${fmtEth(collEV(c))}</td>
      <td>${fmtNum(c.floor_price_eth)}</td>
      <td>${fmtNum(c.best_offer_eth)}</td>
      <td>${c.spread_pair_count ?? '<span class="v-nil">—</span>'}</td>`;
    if (has) rank++;
    tbody.appendChild(tr);
  }
}

function setupSpreadTable() {
  document.getElementById('tab-chart').addEventListener('click', () => switchTab('chart'));
  document.getElementById('tab-spread').addEventListener('click', () => switchTab('spread'));
  document.querySelectorAll('#spread-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      spreadSort.dir = spreadSort.col === col && spreadSort.dir === 'desc' ? 'asc' : 'desc';
      spreadSort.col = col;
      renderSpreadTable();
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  const r = await fetch('/api/collections');
  S.collections = await r.json();

  // Assign stable colors
  S.collections.forEach((c, i) => S.colors.set(c.slug, PALETTE[i % PALETTE.length]));

  renderCollections();
  setupSpreadTable();

  setupGroup('win-btns',    'window', redraw);
  setupGroup('metric-btns', 'metric', redraw);
  setupGroup('scale-btns',  'scale',  redraw);
  setupGroup('range-btns',  'range',  redraw);

  if (S.collections.length > 0) {
    await loadAllCollections();
    redraw();
  }
}

init();
</script>
</body>
